name: CD

# Runs only when the CI workflow completes successfully on main
# (i.e., after a PR is merged and all tests pass)
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Never cancel an in-flight deployment — finish or fail cleanly
concurrency:
  group: cd-production
  cancel-in-progress: false

# ── Required GitHub Secrets ────────────────────────────────────────────────
# AZURE_CREDENTIALS               Service-principal JSON  (az ad sp create-for-rbac)
# AZURE_WEBAPP_NAME               App Service name        e.g. project-pulse-api
# AZURE_STATIC_WEB_APPS_API_TOKEN Deployment token from Azure Static Web Apps resource
# DB_URL                          jdbc:mysql://host:3306/project_pulse?useSSL=true&serverTimezone=UTC
# DB_USERNAME                     Production DB user
# DB_PASSWORD                     Production DB password
# JWT_SECRET_KEY                  256-bit+ random secret
# MAIL_HOST / MAIL_PORT           SMTP host and port
# MAIL_USERNAME / MAIL_PASSWORD   SMTP credentials
# VITE_API_BASE_URL               Full backend URL e.g. https://project-pulse-api.azurewebsites.net
# CORS_ALLOWED_ORIGINS            Comma-separated list e.g. https://project-pulse.azurestaticapps.net
# ──────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  #  Backend — build JAR, push env vars, deploy to Azure App Service
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Azure App Service
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      # Build production JAR — tests already passed in CI
      - name: Build JAR
        run: ./mvnw -B package -Dmaven.test.skip=true
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Push all environment variables to App Service settings
      # Azure App Service Java runtime must be set to Java 21 (SE) in the portal
      - name: Configure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "DB_URL",               "value": "${{ secrets.DB_URL }}",               "slotSetting": false },
              { "name": "DB_USERNAME",           "value": "${{ secrets.DB_USERNAME }}",           "slotSetting": false },
              { "name": "DB_PASSWORD",           "value": "${{ secrets.DB_PASSWORD }}",           "slotSetting": false },
              { "name": "JWT_SECRET_KEY",        "value": "${{ secrets.JWT_SECRET_KEY }}",        "slotSetting": false },
              { "name": "MAIL_HOST",             "value": "${{ secrets.MAIL_HOST }}",             "slotSetting": false },
              { "name": "MAIL_PORT",             "value": "${{ secrets.MAIL_PORT }}",             "slotSetting": false },
              { "name": "MAIL_USERNAME",         "value": "${{ secrets.MAIL_USERNAME }}",         "slotSetting": false },
              { "name": "MAIL_PASSWORD",         "value": "${{ secrets.MAIL_PASSWORD }}",         "slotSetting": false },
              { "name": "CORS_ALLOWED_ORIGINS",  "value": "${{ secrets.CORS_ALLOWED_ORIGINS }}",  "slotSetting": false },
              { "name": "FRONTEND_BASE_URL",     "value": "${{ secrets.VITE_API_BASE_URL }}",     "slotSetting": false },
              { "name": "SPRING_PROFILES_ACTIVE","value": "prod",                                 "slotSetting": false }
            ]

      # Deploy the JAR — App Service restarts automatically
      - name: Deploy JAR to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: backend/target/*.jar

  # ──────────────────────────────────────────────────────────────────────────
  #  Frontend — build with production API URL, deploy to Azure Static Web Apps
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Azure Static Web Apps
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # VITE_API_BASE_URL bakes the backend URL into the production bundle
      # e.g. https://project-pulse-api.azurewebsites.net
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # staticwebapp.config.json (in frontend/) handles Vue Router history-mode fallback
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend        # repo-root-relative source folder
          output_location: dist         # relative to app_location
          skip_app_build: true          # we already built above
