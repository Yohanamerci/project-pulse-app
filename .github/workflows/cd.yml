name: CD

# Runs only when the CI workflow completes successfully on main
# (i.e., after a PR is merged and all tests pass)
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Never cancel an in-flight deployment — finish or fail cleanly
concurrency:
  group: cd-production
  cancel-in-progress: false

# ── Required GitHub Secrets ────────────────────────────────────────────────
# AZURE_PUBLISH_PROFILE           Publish profile XML from: az webapp deployment list-publishing-profiles
# AZURE_WEBAPP_NAME               App Service name        e.g. project-pulse-app
# AZURE_STATIC_WEB_APPS_API_TOKEN Deployment token from Azure Static Web Apps resource
# VITE_API_BASE_URL               Full backend URL e.g. https://project-pulse-app.azurewebsites.net
# NOTE: DB_URL, JWT_SECRET_KEY, CORS_ALLOWED_ORIGINS, etc. are set manually
#       in Azure Portal → App Service → Configuration → Application settings
# ──────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  #  Backend — build JAR, push env vars, deploy to Azure App Service
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Azure App Service
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      # Build production JAR — tests already passed in CI
      # App settings (DB, JWT, CORS, etc.) are pre-configured in Azure Portal
      - name: Build JAR
        run: ./mvnw -B package -Dmaven.test.skip=true

      # Deploy the JAR using publish profile — no service principal required
      - name: Deploy JAR to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: backend/target/*.jar

  # ──────────────────────────────────────────────────────────────────────────
  #  Frontend — build with production API URL, deploy to Azure Static Web Apps
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Azure Static Web Apps
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # VITE_API_BASE_URL bakes the backend URL into the production bundle
      # e.g. https://project-pulse-api.azurewebsites.net
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Copy staticwebapp.config.json into dist before deploying
      - name: Copy SWA config into dist
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      # Deploy pre-built dist folder directly
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: "."
          skip_app_build: true
