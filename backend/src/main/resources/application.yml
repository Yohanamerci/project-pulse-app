spring:
  application:
    name: project-pulse
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/project_pulse?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false


  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:changeme-use-a-long-random-256-bit-secret-in-production!}
    token-expiry-seconds: 86400   # 24 hours

server:
  port: 8080
  error:
    include-message: always

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://*.azurewebsites.net,https://*.azurestaticapps.net}

logging:
  level:
    edu.tcu.cs.projectpulse: INFO
    org.flywaydb: INFO
