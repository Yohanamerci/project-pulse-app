spring:
  application:
    name: project-pulse
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/project_pulse?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:changeme-use-a-long-random-256-bit-secret-in-production!}
    token-expiry-seconds: 86400   # 24 hours

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    edu.tcu.cs.projectpulse: INFO
